<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reseñas de Pipo · Cultura</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:wght@300;400;500&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet">
<style>
  :root {
    --bg: #F4EFE4;
    --surface: #FDFAF4;
    --card-bg: #FDFAF4;
    --gold: #8a6d2f;
    --gold-light: #b8922e;
    --cream: #1A1710;
    --muted: #9A9484;
    --ink-mid: #3D3A30;
    --border: rgba(26, 23, 16, 0.1);
    --border-strong: rgba(26, 23, 16, 0.2);
    --transition: cubic-bezier(0.23, 1, 0.32, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRAIN OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.25;
  }

  /* ── BANNER ── */
  .banner {
    position: relative;
    padding: 0;
    overflow: hidden;
    border-bottom: 1px solid var(--border-strong);
  }

  .banner-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 2rem 2.5rem;
    position: relative;
    z-index: 1;
  }

  .banner-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.2rem, 8vw, 7rem);
    font-weight: 900;
    line-height: 0.9;
    text-align: center;
    color: var(--cream);
    letter-spacing: -0.02em;
  }

  .banner-title span {
    color: var(--gold);
    font-style: italic;
  }

  .deco-line {
    width: 80px;
    height: 1px;
    background: var(--border-strong);
    margin: 1.2rem auto 0;
  }

  /* no ::after gold gradient needed in light mode */
  .banner::after { display: none; }

  /* ── NAV / CATEGORIES ── */
  .nav-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(244, 239, 228, 0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-strong);
    padding: 0 2rem;
  }

  .nav-inner {
    display: flex;
    align-items: center;
    gap: 0;
    max-width: 1400px;
    margin: 0 auto;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .nav-inner::-webkit-scrollbar { display: none; }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 1.1rem 1.6rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.3s var(--transition);
    white-space: nowrap;
    position: relative;
  }

  .nav-btn:hover {
    color: var(--ink-mid);
  }

  .nav-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .nav-btn .nav-icon {
    font-size: 0.9rem;
  }

  .nav-count {
    font-size: 0.55rem;
    background: var(--gold);
    color: var(--surface);
    border-radius: 10px;
    padding: 0.1rem 0.35rem;
    font-weight: 600;
  }

  /* ── SUBCATEGORIES ── */
  .sub-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 2rem;
    display: none;
    animation: slideDown 0.3s var(--transition);
  }

  .sub-nav.visible {
    display: flex;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .sub-nav-inner {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    max-width: 1400px;
    margin: 0 auto;
    overflow-x: auto;
    scrollbar-width: none;
    flex-wrap: wrap;
  }

  .sub-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-right: 0.5rem;
  }

  .sub-btn {
    padding: 0.3rem 0.8rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--border-strong);
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    white-space: nowrap;
  }

  .sub-btn:hover, .sub-btn.active {
    color: var(--gold);
    border-color: var(--gold);
    background: rgba(138, 109, 47, 0.08);
  }

  /* ── GRID ── */
  .main-content {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2.5rem 2rem 5rem;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--cream);
  }

  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.5rem;
  }

  /* ── POSTER CARD ── */
  .card {
    position: relative;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    background: var(--card-bg);
    border: 1px solid var(--border-strong);
    transition: transform 0.4s var(--transition), box-shadow 0.4s var(--transition);
    will-change: transform;
    animation: fadeIn 0.5s var(--transition) both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Xbox 360-style hover: scale + tilt + glow */
  .card:hover {
    transform: scale(1.07) rotate(-0.8deg);
    box-shadow:
      0 20px 50px rgba(26, 23, 16, 0.18),
      0 4px 16px rgba(26, 23, 16, 0.12);
    z-index: 10;
    border-color: rgba(138, 109, 47, 0.5);
  }

  .card:hover .card-poster {
    filter: brightness(1.08) saturate(1.1);
  }

  .card:hover .card-overlay {
    opacity: 1;
  }

  .card:hover .card-info {
    transform: translateY(0);
    opacity: 1;
  }

  .card-poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
    transition: filter 0.4s ease;
    background: #1a1714;
  }

  /* Placeholder poster for demo */
  .card-poster-placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
    transition: filter 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .poster-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--c1), var(--c2));
    opacity: 0.85;
  }

  .poster-icon {
    font-size: 2.5rem;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
  }

  .poster-genre-tag {
    display: none;
  }

  .poster-title-overlay {
    display: none;
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top,
      rgba(0,0,0,0.92) 0%,
      rgba(0,0,0,0.3) 50%,
      transparent 100%
    );
    opacity: 0.7;
    transition: opacity 0.4s ease;
  }

  /* Admin controls on cards */
  .card-admin {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    display: none;
    flex-direction: column;
    gap: 0.3rem;
    z-index: 20;
  }

  body.admin-mode .card-admin {
    display: flex;
  }

  .card-admin-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .card-admin-btn:hover { transform: scale(1.15); }
  .btn-edit { background: #f0c040; color: #1a1710; }
  .btn-delete { background: #c0392b; color: white; }

  .card-info {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 1rem;
    transform: translateY(6px);
    opacity: 0.85;
    transition: all 0.4s var(--transition);
  }

  .card-category-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.3rem;
    display: block;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.2;
    color: white;
    margin-bottom: 0.3rem;
  }

  .card-author {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.6);
    font-weight: 300;
  }

  .card-rating {
    display: flex;
    gap: 2px;
    margin-top: 0.4rem;
  }

  .star {
    color: var(--gold);
    font-size: 0.65rem;
  }

  .star.empty {
    color: rgba(255,255,255,0.2);
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 23, 16, 0.5);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    max-width: 680px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    position: relative;
    transform: scale(0.95) translateY(20px);
    transition: transform 0.4s var(--transition);
    scrollbar-width: thin;
    scrollbar-color: var(--border-strong) transparent;
  }

  .modal-overlay.open .modal {
    transform: scale(1) translateY(0);
  }

  .modal-close {
    position: absolute;
    top: 1.2rem;
    right: 1.2rem;
    background: none;
    border: 1px solid var(--border-strong);
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    z-index: 10;
  }

  .modal-close:hover {
    color: var(--cream);
    border-color: var(--gold);
  }

  .modal-header {
    padding: 2rem 2rem 1.2rem;
    border-bottom: 1px solid var(--border);
  }

  .modal-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.6rem;
    display: block;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    line-height: 1.05;
    color: var(--cream);
    margin-bottom: 0.35rem;
    padding-right: 2.5rem;
  }

  .modal-author {
    font-size: 0.95rem;
    color: var(--ink-mid);
    margin-bottom: 0.8rem;
    font-weight: 300;
  }

  .modal-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 0.8rem;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.2rem 0.6rem;
    border-radius: 2px;
    border: 1px solid var(--border-strong);
    color: var(--muted);
  }

  .modal-rating {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .modal-stars {
    display: flex;
    gap: 3px;
  }

  .modal-stars .star { font-size: 0.9rem; }

  .modal-score {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }

  .modal-body {
    padding: 1.8rem 2rem 2rem;
  }

  .modal-body p {
    font-size: 1rem;
    line-height: 1.85;
    color: var(--ink-mid);
    font-weight: 300;
    margin-bottom: 1rem;
  }

  .modal-body p:first-child::first-letter {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    font-weight: 900;
    float: left;
    line-height: 0.8;
    margin: 0.1em 0.1em 0 0;
    color: var(--gold);
  }

  /* ── EDITOR MODAL ── */
  .editor-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 23, 16, 0.5);
    z-index: 400;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .editor-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .editor-modal {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    width: 100%;
    max-width: 820px;
    max-height: 92vh;
    overflow-y: auto;
    transform: scale(0.96) translateY(16px);
    transition: transform 0.4s var(--transition);
    display: flex;
    flex-direction: column;
  }
  .editor-overlay.open .editor-modal {
    transform: scale(1) translateY(0);
  }
  .editor-top {
    padding: 1.5rem 1.8rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .editor-top h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--cream);
  }
  .editor-close {
    background: none;
    border: 1px solid var(--border-strong);
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .editor-close:hover { color: var(--cream); border-color: var(--gold); }

  .editor-fields {
    padding: 1.2rem 1.8rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem 1.2rem;
    border-bottom: 1px solid var(--border);
  }
  .editor-fields .full { grid-column: 1 / -1; }

  .editor-body {
    padding: 0 1.8rem 1.8rem;
    flex: 1;
  }
  .editor-label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.35rem;
    margin-top: 1rem;
  }
  .editor-fields input,
  .editor-fields select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: 3px;
    padding: 0.5rem 0.7rem;
    color: var(--cream);
    font-family: 'Barlow', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .editor-fields select option { background: var(--surface); color: var(--cream); }
  .editor-fields input:focus,
  .editor-fields select:focus { border-color: var(--gold); }

  /* Embed helper bar */
  .embed-bar {
    display: flex;
    gap: 0.5rem;
    margin: 0.8rem 0 0.4rem;
    flex-wrap: wrap;
  }
  .embed-btn {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.3rem 0.7rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-mid);
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .embed-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* Quill overrides for light theme */
  .ql-toolbar.ql-snow {
    border: 1px solid var(--border-strong) !important;
    border-radius: 3px 3px 0 0 !important;
    background: var(--bg) !important;
    font-family: 'DM Mono', monospace !important;
  }
  .ql-container.ql-snow {
    border: 1px solid var(--border-strong) !important;
    border-top: none !important;
    border-radius: 0 0 3px 3px !important;
    background: var(--surface) !important;
    min-height: 260px;
  }
  .ql-editor {
    font-family: 'Barlow', sans-serif !important;
    font-size: 1rem !important;
    color: var(--ink-mid) !important;
    line-height: 1.8 !important;
    min-height: 260px;
  }
  .ql-editor.ql-blank::before {
    color: var(--muted) !important;
    font-style: normal !important;
  }
  .ql-snow .ql-stroke { stroke: var(--ink-mid) !important; }
  .ql-snow .ql-fill { fill: var(--ink-mid) !important; }
  .ql-snow .ql-picker { color: var(--ink-mid) !important; }
  .ql-snow .ql-picker-options { background: var(--surface) !important; border-color: var(--border-strong) !important; }
  .ql-editor img { max-width: 100%; border-radius: 3px; margin: 0.5rem 0; }
  .ql-editor iframe { max-width: 100%; border-radius: 3px; margin: 0.5rem 0; }

  .editor-footer {
    padding: 1rem 1.8rem 1.5rem;
    display: flex;
    justify-content: flex-end;
    gap: 0.8rem;
    border-top: 1px solid var(--border);
  }
  .btn-cancel {
    padding: 0.6rem 1.2rem;
    background: none;
    border: 1px solid var(--border-strong);
    border-radius: 3px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-cancel:hover { color: var(--cream); border-color: var(--cream); }
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 200;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--bg);
    border: none;
    cursor: pointer;
    font-size: 1.4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(201, 168, 76, 0.4);
    transition: all 0.3s ease;
    opacity: 0;
    pointer-events: none;
    transform: scale(0.5);
  }

  .upload-btn.unlocked {
    opacity: 1;
    pointer-events: all;
    transform: scale(1);
  }

  .upload-btn:hover {
    transform: scale(1.1) rotate(45deg);
    box-shadow: 0 8px 30px rgba(201, 168, 76, 0.6);
  }

  .upload-panel {
    position: fixed;
    bottom: 5rem;
    right: 2rem;
    z-index: 200;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 1.5rem;
    width: 320px;
    box-shadow: 0 20px 60px rgba(26,23,16,0.15);
    display: none;
    animation: slideUp 0.3s var(--transition);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .upload-panel.open {
    display: block;
  }

  .upload-panel h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin-bottom: 1rem;
    color: var(--cream);
  }

  .form-group {
    margin-bottom: 0.8rem;
  }

  .form-group label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: 3px;
    padding: 0.5rem 0.7rem;
    color: var(--cream);
    font-family: 'Barlow', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group select option {
    background: var(--surface);
    color: var(--cream);
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: var(--gold);
  }

  .form-group textarea {
    resize: vertical;
    min-height: 80px;
  }

  .submit-btn {
    width: 100%;
    padding: 0.7rem;

  .empty-state p {

  }

  /* ── TICKER — removed ── */

  /* Responsive */
  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .banner-inner { padding: 2rem 1rem 1.5rem; }
    .banner-title { font-size: clamp(2.4rem, 10vw, 3.5rem); }
    .main-content { padding: 1.5rem 1rem 4rem; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
    .nav-inner { padding: 0 0.5rem; }
    .nav-btn { padding: 0.9rem 0.8rem; font-size: 0.65rem; }
    .modal { max-height: 95vh; border-radius: 12px 12px 0 0; }
    .modal-overlay { align-items: flex-end; padding: 0; }
    .modal-title { font-size: 1.5rem; }
    .editor-modal { max-height: 95vh; border-radius: 12px 12px 0 0; }
    .editor-overlay { align-items: flex-end; padding: 0; }
    .editor-fields { grid-template-columns: 1fr; }
    .editor-fields .full { grid-column: 1; }
    .upload-btn { bottom: 1.2rem; right: 1.2rem; width: 50px; height: 50px; }
  }

  @media (max-width: 400px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
    .card-title { font-size: 0.85rem; }
    .nav-btn .nav-icon { display: none; }

</style>
</head>

    <span class="ticker-item"><span class="ticker-dot"></span>Ensayo</span>
    <span class="ticker-item"><span class="ticker-dot"></span>Serie</span>
    <span class="ticker-item"><span class="ticker-dot"></span>Cuento</span>

    <span class="ticker-item"><span class="ticker-dot"></span>Cine</span>
    <span class="ticker-item"><span class="ticker-dot"></span>Pintura</span>

    <span class="ticker-item"><span class="ticker-dot"></span>Ensayo</span>

<!-- NAV -->

      <span class="nav-icon">◈</span> Todas <span class="nav-count" id="count-todas">12</span>

<!-- EDITOR MODAL -->
<div class="editor-overlay" id="editor-overlay">

    <div class="editor-fields">

          <option value="3">★★★☆☆ — Bueno</option>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
<!-- Firebase compat (no requiere type=module) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
// ── FIREBASE INIT ──
const firebaseConfig = {
  apiKey: "AIzaSyB4AfPoQDtDcQ2zBgsvuQR2giHIHtkGtxE",
  authDomain: "resenasdepipo.firebaseapp.com",
  projectId: "resenasdepipo",
  storageBucket: "resenasdepipo.firebasestorage.app",
  messagingSenderId: "1068800278374",
  appId: "1:1068800278374:web:93bdf2ae748f7b9158d2a7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const COLLECTION = 'resenas';

// ── SECRET UNLOCK ──
let secretClicks = 0;
let secretTimer = null;
let adminUnlocked = false;

function secretClick() {
  secretClicks++;
  clearTimeout(secretTimer);
  secretTimer = setTimeout(() => { secretClicks = 0; }, 2000);

  if (secretClicks >= 5) {
    secretClicks = 0;
    adminUnlocked = !adminUnlocked;

    if (adminUnlocked) {
      document.body.classList.add('admin-mode');
      const btn = document.createElement('button');
      btn.className = 'upload-btn unlocked';
      btn.id = 'upload-btn';
      btn.textContent = '+';
      btn.setAttribute('onclick', 'toggleUpload()');
      document.body.appendChild(btn);
    } else {
      document.body.classList.remove('admin-mode');
      const btn = document.getElementById('upload-btn');
      if (btn) btn.remove();
      if (uploadOpen) toggleUpload();
    }

    // Flash sutil en el título
    const title = document.getElementById('secret-trigger');
    title.style.transition = 'color 0.2s';
    title.style.color = adminUnlocked ? 'var(--gold)' : 'var(--muted)';
    setTimeout(() => { title.style.color = ''; }, 500);
  }
}

// ── DATA ──
const subcats = {
  literatura: ['Novela', 'Cuento', 'Poesía', 'Ensayo', 'Infantil y juvenil'],
  cine: ['Película', 'Serie'],
  pintura: ['Óleo', 'Acuarela', 'Arte digital', 'Fotografía'],
  musica: ['Álbum', 'Canción', 'Concierto', 'Ópera']
};

const catColors = {
  literatura: ['#1a3a5c', '#0d2137'],
  cine:       ['#3a1a1a', '#1f0d0d'],
  pintura:    ['#1a3a2a', '#0d2116'],
  musica:     ['#2a1a3a', '#160d21']
};

const catIcons = {
  literatura: '📖',
  cine:       '🎬',
  pintura:    '🖼️',
  musica:     '🎵'
};

let reviews = [];
let currentCat = 'todas';
let currentSubcat = null;

async function loadReviews() {
  try {
    const snap = await db.collection(COLLECTION).orderBy('createdAt', 'desc').get();
    reviews = snap.docs.map(d => ({ ...d.data(), firestoreId: d.id, id: d.id }));
    updateCounts();
    renderGrid();
  } catch(e) {
    console.error('Error cargando reseñas:', e);
    renderGrid();
  }
}

// ── INIT ──
updateSubcatOptions();
loadReviews();

function updateCounts() {
  document.getElementById('count-todas').textContent = reviews.length;
  ['literatura','cine','pintura','musica'].forEach(cat => {
    document.getElementById(`count-${cat}`).textContent = reviews.filter(r => r.cat === cat).length;
  });
}

function updateSubcatOptions() {
  const cat = document.getElementById('inp-cat').value;
  const sel = document.getElementById('inp-subcat');
  sel.innerHTML = subcats[cat].map(s => `<option value="${s}">${s}</option>`).join('');
}

function filterCategory(cat) {
  currentCat = cat;
  currentSubcat = null;

  // Update nav
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));

  // Subcategory nav
  const subNav = document.getElementById('sub-nav');
  const subInner = document.getElementById('sub-nav-inner');

  if (cat !== 'todas' && subcats[cat]) {
    subNav.classList.add('visible');
    const counts = {};
    reviews.filter(r => r.cat === cat).forEach(r => { counts[r.subcat] = (counts[r.subcat]||0)+1; });
    subInner.innerHTML = `<span class="sub-label">Filtrar:</span>
      <button class="sub-btn active" onclick="filterSubcat(null, this)">Todas</button>
      ${subcats[cat].filter(s => counts[s]).map(s =>
        `<button class="sub-btn" onclick="filterSubcat('${s}', this)">${s} (${counts[s]||0})</button>`
      ).join('')}`;
  } else {
    subNav.classList.remove('visible');
  }

  // Section title
  const titles = { todas: 'Todas las reseñas', literatura: 'Literatura', cine: 'Cine', pintura: 'Pintura', musica: 'Música' };
  document.getElementById('section-title').textContent = titles[cat];

  renderGrid();
}

function filterSubcat(sub, btn) {
  currentSubcat = sub;
  document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  let filtered = reviews;
  if (currentCat !== 'todas') filtered = filtered.filter(r => r.cat === currentCat);
  if (currentSubcat) filtered = filtered.filter(r => r.subcat === currentSubcat);

  document.getElementById('section-count').textContent = `${filtered.length} entrada${filtered.length !== 1 ? 's' : ''}`;

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty-state');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.classList.add('visible');
    return;
  }
  empty.classList.remove('visible');

  grid.innerHTML = filtered.map((r, i) => {
    const [c1, c2] = catColors[r.cat];
    const icon = catIcons[r.cat];
    const cardId = r.firestoreId || r.id;
    const stars = Array.from({length:5}, (_,k) =>
      `<span class="star${k >= r.rating ? ' empty' : ''}">★</span>`).join('');
    const posterHTML = r.poster
      ? `<img src="${r.poster}" style="width:100%;aspect-ratio:2/3;object-fit:cover;display:block;">`
      : `<div class="card-poster-placeholder" style="--c1:${c1}; --c2:${c2}">
          <div class="poster-bg"></div>
          <div class="poster-icon">${icon}</div>
          <div class="poster-genre-tag">${r.subcat}</div>
          <div class="poster-title-overlay">${r.title}</div>
        </div>`;
    return `
    <div class="card" style="animation-delay:${i*0.06}s" onclick="handleCardClick(event, '${cardId}')">
      ${posterHTML}
      <div class="card-overlay"></div>
      <div class="card-admin">
        <button class="card-admin-btn btn-edit" onclick="editReview(event, '${cardId}')" title="Editar">✏️</button>
        <button class="card-admin-btn btn-delete" onclick="deleteReview(event, '${cardId}')" title="Borrar">🗑</button>
      </div>
      <div class="card-info">
        <span class="card-category-badge">${r.subcat}</span>
        <div class="card-title">${r.title}</div>
        <div class="card-author">${r.author}</div>
        <div class="card-rating">${stars}</div>
      </div>
    </div>`;
  }).join('');
}

function openModal(id) {
  const r = reviews.find(x => (x.firestoreId || x.id) === id);
  if (!r) return;

  document.getElementById('modal-eyebrow').textContent = `${r.cat.charAt(0).toUpperCase()+r.cat.slice(1)} · ${r.subcat}`;
  document.getElementById('modal-title').textContent = r.title;
  document.getElementById('modal-author').textContent = r.author;
  const dateEl = document.getElementById('modal-date');
  if (r.date) {
    const [y,m,d] = r.date.split('-');
    const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    dateEl.textContent = `${d} de ${months[parseInt(m)-1]} de ${y}`;
  } else {
    dateEl.textContent = '';
  }
  document.getElementById('modal-tags').innerHTML = `<span class="tag">${r.cat}</span><span class="tag">${r.subcat}</span>`;

  const stars = Array.from({length:5}, (_,k) =>
    `<span class="star${k >= r.rating ? ' empty' : ''}">★</span>`).join('');
  document.getElementById('modal-stars').innerHTML = stars;
  document.getElementById('modal-score').textContent = `${r.rating}/5`;

  document.getElementById('modal-body').innerHTML = r.html
    ? r.html
    : r.text.split('\n\n').map(p => `<p>${p}</p>`).join('');

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

let uploadOpen = false;
let quill = null;

function initQuill() {
  if (quill) return;
  quill = new Quill('#quill-editor', {
    theme: 'snow',
    placeholder: 'Escribe tu reseña aquí. Puedes pegar enlaces, subir imágenes o incrustar videos con los botones de arriba...',
    modules: {
      toolbar: [
        [{ header: [2, 3, false] }],
        ['bold', 'italic', 'underline'],
        [{ list: 'ordered' }, { list: 'bullet' }],
        ['blockquote'],
        ['link', 'image'],
        ['clean']
      ]
    }
  });
}

function toggleUpload() {
  if (!uploadOpen) {
    // Verificar pregunta de seguridad antes de abrir
    const resp = prompt('¿Personaje favorito?');
    if (!resp || resp.trim().toLowerCase() !== 'hightower') {
      // Respuesta incorrecta — cerrar y eliminar botón
      adminUnlocked = false;
      const btn = document.getElementById('upload-btn');
      if (btn) btn.remove();
      return;
    }
  }
  uploadOpen = !uploadOpen;
  const overlay = document.getElementById('editor-overlay');
  overlay.classList.toggle('open', uploadOpen);
  document.body.style.overflow = uploadOpen ? 'hidden' : '';
  if (uploadOpen) initQuill();
}

// ── EMBED HELPERS ──
function embedYouTube() {
  const url = prompt('Pega el enlace del video de YouTube:');
  if (!url) return;
  const match = url.match(/(?:v=|youtu\.be\/)([^&\s]+)/);
  if (!match) { alert('No pude reconocer el enlace. Usa un enlace normal de YouTube.'); return; }
  const id = match[1];
  const html = `<iframe width="100%" height="360" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>`;
  insertEmbed(html);
}

function embedTweet() {
  const url = prompt('Pega el enlace del tweet / post de X:');
  if (!url) return;
  const html = `<blockquote class="twitter-tweet"><a href="${url}"></a></blockquote>`;
  insertEmbed(html);
  // Load Twitter widget script if not loaded
  if (!window.twttr) {
    const s = document.createElement('script');
    s.src = 'https://platform.twitter.com/widgets.js';
    document.body.appendChild(s);
  } else {
    window.twttr.widgets && window.twttr.widgets.load();
  }
}

function embedSpotify() {
  const url = prompt('Pega el enlace de Spotify (canción, álbum o podcast):');
  if (!url) return;
  const match = url.match(/spotify\.com\/(track|album|episode|playlist)\/([a-zA-Z0-9]+)/);
  if (!match) { alert('No pude reconocer el enlace. Usa un enlace normal de Spotify.'); return; }
  const embedUrl = `https://open.spotify.com/embed/${match[1]}/${match[2]}`;
  const html = `<iframe src="${embedUrl}" width="100%" height="152" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>`;
  insertEmbed(html);
}

function embedImage() {
  const url = prompt('Pega la URL de la imagen:');
  if (!url) return;
  const range = quill.getSelection(true);
  quill.insertEmbed(range.index, 'image', url);
}

function insertEmbed(html) {
  const range = quill.getSelection(true);
  quill.clipboard.dangerouslyPasteHTML(range.index, html);
}

function previewPoster(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('poster-preview-img').src = e.target.result;
    document.getElementById('poster-preview').style.display = 'block';
    document.getElementById('inp-poster-url').value = ''; // limpiar URL si hay archivo
  };
  reader.readAsDataURL(file);
}

function getPosterData() {
  return new Promise(resolve => {
    const file = document.getElementById('inp-poster-file').files[0];
    const url = document.getElementById('inp-poster-url').value.trim();
    if (file) {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    } else if (url) {
      resolve(url);
    } else {
      resolve(null);
    }
  });
}

async function addReview() {
  const title = document.getElementById('inp-title').value.trim();
  const author = document.getElementById('inp-author').value.trim();
  const cat = document.getElementById('inp-cat').value;
  const subcat = document.getElementById('inp-subcat').value;
  const rating = parseInt(document.getElementById('inp-rating').value);
  const html = quill ? quill.root.innerHTML.trim() : '';
  const poster = await getPosterData();
  const date = document.getElementById('inp-date').value;

  if (!title || !html || html === '<p><br></p>') {
    alert('Por favor completa el título y el texto de la reseña.');
    return;
  }

  try {
    const docRef = await db.collection(COLLECTION).add({
      cat, subcat, title,
      author: author || 'Pipo',
      rating, html,
      poster: poster || null,
      date: date || null,
      createdAt: Date.now()
    });
    const newReview = { cat, subcat, title, author: author || 'Pipo', rating, html, poster: poster || null, date: date || null, id: docRef.id, firestoreId: docRef.id, createdAt: Date.now() };
    reviews.unshift(newReview);

    document.getElementById('inp-title').value = '';
    document.getElementById('inp-author').value = '';
    document.getElementById('inp-date').value = '';
    document.getElementById('inp-poster-url').value = '';
    document.getElementById('inp-poster-file').value = '';
    document.getElementById('poster-preview').style.display = 'none';
    if (quill) quill.setContents([]);

    updateCounts();
    renderGrid();
    toggleUpload();
  } catch(e) {
    alert('Error al guardar. Intenta de nuevo.');
    console.error(e);
  }
}

function handleCardClick(e, id) {
  if (e.target.closest('.card-admin')) return;
  openModal(id);
}

async function deleteReview(e, id) {
  e.stopPropagation();
  const resp = prompt('¿Personaje favorito?');
  if (!resp || resp.trim().toLowerCase() !== 'hightower') return;
  if (!confirm('¿Borrar esta reseña? Esta acción no se puede deshacer.')) return;
  const r = reviews.find(x => (x.firestoreId || x.id) === id);
  if (!r) return;
  try {
    await db.collection(COLLECTION).doc(r.firestoreId).delete();
    reviews = reviews.filter(x => (x.firestoreId || x.id) !== id);
    updateCounts();
    renderGrid();
  } catch(err) {
    alert('Error al borrar. Intenta de nuevo.');
    console.error(err);
  }
}

function editReview(e, id) {
  e.stopPropagation();
  const r = reviews.find(x => (x.firestoreId || x.id) === id);
  if (!r) return;

  // Verificar pregunta de seguridad
  const resp = prompt('¿Personaje favorito?');
  if (!resp || resp.trim().toLowerCase() !== 'hightower') return;

  // Llenar formulario con datos existentes
  uploadOpen = false; // forzar estado
  toggleUpload();

  setTimeout(() => {
    document.getElementById('inp-title').value = r.title;
    document.getElementById('inp-author').value = r.author;
    document.getElementById('inp-cat').value = r.cat;
    updateSubcatOptions();
    document.getElementById('inp-subcat').value = r.subcat;
    document.getElementById('inp-rating').value = r.rating;
    if (r.poster) document.getElementById('inp-poster-url').value = r.poster;
    if (quill && r.html) quill.root.innerHTML = r.html;
    else if (quill && r.text) quill.root.innerHTML = r.text.split('\n\n').map(p=>`<p>${p}</p>`).join('');
    if (r.date) document.getElementById('inp-date').value = r.date;

    // Cambiar publicar por actualizar
    const submitBtn = document.querySelector('.editor-footer .submit-btn');
    submitBtn.textContent = 'Actualizar reseña';
    submitBtn.onclick = () => updateReview(id);
  }, 300);
}

async function updateReview(id) {
  const idx = reviews.findIndex(x => (x.firestoreId || x.id) === id);
  if (idx === -1) return;

  const updated = {
    title: document.getElementById('inp-title').value.trim(),
    author: document.getElementById('inp-author').value.trim(),
    cat: document.getElementById('inp-cat').value,
    subcat: document.getElementById('inp-subcat').value,
    rating: parseInt(document.getElementById('inp-rating').value),
    html: quill ? quill.root.innerHTML.trim() : reviews[idx].html,
    poster: document.getElementById('inp-poster-url').value.trim() || reviews[idx].poster || null,
    date: document.getElementById('inp-date').value || reviews[idx].date || null
  };

  try {
    await db.collection(COLLECTION).doc(reviews[idx].firestoreId).update(updated);
    reviews[idx] = { ...reviews[idx], ...updated };

    const submitBtn = document.querySelector('.editor-footer .submit-btn');
    submitBtn.textContent = 'Publicar reseña';
    submitBtn.onclick = addReview;

    updateCounts();
    renderGrid();
    toggleUpload();
  } catch(err) {
    alert('Error al actualizar. Intenta de nuevo.');
    console.error(err);
  }
}

// Keyboard close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModalBtn();
    if (uploadOpen) toggleUpload();
  }
});

// ── Exponer funciones al scope global para los onclick del HTML ──
window.secretClick = secretClick;
window.filterCategory = filterCategory;
window.filterSubcat = filterSubcat;
window.openModal = openModal;
window.closeModal = closeModal;
window.closeModalBtn = closeModalBtn;
window.toggleUpload = toggleUpload;
window.addReview = addReview;
window.deleteReview = deleteReview;
window.editReview = editReview;
window.updateReview = updateReview;
window.handleCardClick = handleCardClick;
window.embedYouTube = embedYouTube;
window.embedTweet = embedTweet;
window.embedSpotify = embedSpotify;
window.embedImage = embedImage;
window.updateSubcatOptions = updateSubcatOptions;
window.previewPoster = previewPoster;
</script>
